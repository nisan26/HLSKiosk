name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: Setup Gradle 8.4
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Prepare APK
      run: |
        mkdir -p output
        cp app/build/outputs/apk/debug/app-debug.apk output/HLSKiosk.apk
        ls -lh output/

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: HLSKiosk-APK
        path: output/HLSKiosk.apk
        retention-days: 90

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: HLSKiosk Build ${{ github.run_number }}
        files: output/HLSKiosk.apk
        body: |
          Automatic build
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
